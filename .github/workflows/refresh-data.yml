name: Refresh DfE seed data

on:
  schedule:
    # Mondays 06:00 UTC — after typical DfE weekday publish cycles
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: npm ci

      - name: Refresh Bartley seed from DfE API / CSP history
        id: refresh
        continue-on-error: true
        run: npm run refresh-data

      - name: Refresh curated peer school metrics
        id: peers
        continue-on-error: true
        run: npm run refresh-peers

      - name: Detect changes
        id: changes
        if: steps.refresh.outcome == 'success' || steps.peers.outcome == 'success'
        run: |
          if git diff --quiet -- src/data/bartley-2024-25.json src/data/peer-schools.json src/data/change-log.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: (steps.refresh.outcome == 'success' || steps.peers.outcome == 'success') && steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh Bartley and peer DfE seed data"
          title: "Refresh Bartley and peer DfE seed data"
          body: |
            Automated refresh of:

            - `src/data/bartley-2024-25.json` (Bartley seed)
            - `src/data/change-log.json` (what moved since previous seed)
            - `src/data/peer-schools.json` (curated peer metrics from CSP KS2 downloads)

            Please review figures before merging.
          branch: chore/refresh-dfe-data
          delete-branch: true
